<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contraseña actualizada | CampoMarkt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 min-h-screen flex items-center justify-center px-4 py-6">

  <div class="w-full max-w-md bg-white border rounded-2xl shadow-2xl p-6 sm:p-8 text-center">

    <h1 class="text-xl sm:text-2xl font-bold text-green-700 mb-2 leading-tight">
      ¡Contraseña actualizada!
    </h1>

    <p class="text-gray-600 text-sm sm:text-base mb-6 leading-relaxed">
      Tu contraseña fue cambiada correctamente. Ya puedes iniciar sesión.
    </p>

    <a href="{% url 'login_page' %}"
       class="inline-block w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition text-sm sm:text-base">
      Ir al login
    </a>

  </div>

</body>
</html>
