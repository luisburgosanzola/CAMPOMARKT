{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar contraseña | CampoMarkt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white min-h-screen flex items-center justify-center px-4 py-6 sm:p-6">

  <div class="w-full max-w-md p-6 sm:p-8 bg-white rounded-xl shadow-2xl border">

    <h1 class="text-xl sm:text-2xl font-bold text-green-600 text-center mb-2 leading-tight">
      Recuperar contraseña
    </h1>

    <p class="text-gray-600 text-xs sm:text-sm text-center mb-6 leading-relaxed">
      Escribe tu correo registrado y te enviaremos un enlace para cambiar tu contraseña.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="font-semibold text-sm sm:text-base">Correo</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 sm:py-3 rounded-lg bg-green-100 
                      focus:outline-none focus:ring-2 focus:ring-green-400
                      text-sm sm:text-base">
      </div>

      <button type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold 
                     py-3 rounded-lg transition text-sm sm:text-base">
        Enviar enlace
      </button>
    </form>

    <p class="text-center mt-4 text-xs sm:text-sm">
      <a href="/login/" class="text-green-700 font-semibold hover:underline">
        Volver a iniciar sesión
      </a>
    </p>

  </div>

</body>
</html>
