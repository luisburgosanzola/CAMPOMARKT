{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar correo | CampoMarkt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 min-h-screen flex items-center justify-center px-4">

    <div class="bg-white w-full max-w-md rounded-xl shadow-2xl p-8 border">

        <h1 class="text-2xl font-bold text-green-600 text-center mb-4">
            Verifica tu correo
        </h1>

        <p class="text-gray-600 text-center mb-6">
            Te enviamos un <strong>código de 6 dígitos</strong> al correo:<br>
            <span class="font-semibold text-gray-800">{{ email }}</span>
        </p>

        <!-- MENSAJES -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm
                    {% if message.tags == 'error' %}
                        bg-red-100 text-red-700 border border-red-200
                    {% elif message.tags == 'success' %}
                        bg-green-100 text-green-700 border border-green-200
                    {% else %}
                        bg-yellow-100 text-yellow-700 border border-yellow-200
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM ÚNICO -->
        <form method="POST" action="{% url 'verify_email' %}" class="space-y-4">
            {% csrf_token %}

            <input
                type="text"
                name="code"
                maxlength="6"
                required
                placeholder="Ingresa el código"
                class="w-full text-center text-xl tracking-widest px-4 py-3 rounded-lg bg-green-100 outline-none focus:ring-2 focus:ring-green-400"
            >

            <button
                type="submit"
                name="action"
                value="verify"
                class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition"
            >
                Verificar correo
            </button>

            <button
                type="submit"
                name="action"
                value="resend"
                class="w-full text-sm text-gray-600 hover:text-green-600 underline"
            >
                Reenviar código
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'login_page' %}" 
               class="text-sm text-gray-500 hover:text-green-600">
                ← Volver al inicio de sesión
            </a>
        </div>

    </div>

</body>
</html>
