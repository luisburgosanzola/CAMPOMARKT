<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Iniciar sesión | CampoMarkt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white min-h-screen flex items-center justify-center">
  {% load static socialaccount %}

  <div class="flex flex-col md:flex-row items-center justify-center max-w-5xl mx-auto p-6 gap-6">

    <!-- IMAGEN -->
    <div class="hidden md:block md:w-1/2">
      <img src="{% static 'img/1.jpg' %}" class="rounded-xl shadow-lg w-full h-auto object-cover" alt="Campo" />
    </div>

    <!-- CARD -->
    <div class="w-full md:w-1/2 p-8 bg-white rounded-xl shadow-2xl border border-gray-200">

      <h1 class="text-3xl font-bold text-green-600 mb-6 text-center">INICIAR SESIÓN</h1>

      {% if messages %}
      <div class="space-y-2 mb-4">
        {% for message in messages %}
        <div class="p-3 rounded-lg
          {% if message.tags == 'success' %} bg-green-100 text-green-800 border border-green-400
          {% elif message.tags == 'error' %} bg-red-100 text-red-800 border border-red-400
          {% else %} bg-gray-100 text-gray-800 border border-gray-400 {% endif %}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'login_page' %}" class="space-y-4">
        {% csrf_token %}

        <!-- EMAIL -->
        <div>
          <label class="block text-gray-700 font-semibold mb-1">EMAIL</label>
          <input name="email" type="email" placeholder="Tu correo" required
            class="w-full px-4 py-2 rounded-lg bg-green-100 focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- PASSWORD + OJITO -->
        <div>
          <label class="block text-gray-700 font-semibold mb-1">CONTRASEÑA</label>

          <div class="relative">
            <input id="login_password" type="password" name="password" placeholder="Tu contraseña" required
              class="w-full px-4 py-2 pr-12 rounded-lg bg-green-100 focus:outline-none focus:ring-2 focus:ring-green-400">

            <button type="button" id="toggleLoginPassword" class="absolute right-3 top-1/2 -translate-y-1/2 z-10">
              👁
            </button>
          </div>
        </div>

        <div class="text-right">
          <a href="{% url 'account_reset_password' %}" class="text-sm text-green-700 font-semibold hover:underline">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <button class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg">
          ENTRAR
        </button>
      </form>

      <!-- GOOGLE -->
      <div class="mt-6">
        <a href="{% provider_login_url 'google' process='login' next='/google/completar/' %}"
          class="w-full flex items-center justify-center gap-3 py-2 border border-gray-300 rounded-lg shadow-sm hover:bg-gray-100 transition">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
          <span class="text-gray-700 font-semibold">Continuar con Google</span>
        </a>


      </div>

      <p class="text-center text-sm mt-4">
        ¿No tienes cuenta?
        <a class="text-green-700 font-semibold hover:underline" href="{% url 'register_page' %}">
          Regístrate
        </a>
      </p>

    </div>
  </div>

  <!-- JS OJITO -->
  <script>
    document.getElementById("toggleLoginPassword")
      .addEventListener("click", function () {
        const input = document.getElementById("login_password");
        input.type = input.type === "password" ? "text" : "password";
      });
  </script>

</body>

</html>
