{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Completar Perfil Cliente | CampoMarkt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 via-white to-orange-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-xl relative overflow-hidden">

    <!-- Decoración -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-green-200 rounded-full opacity-30"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-orange-200 rounded-full opacity-30"></div>

    <!-- Logo -->
    <div class="text-center mb-6">
        <img src="{% static 'img/logo1.png' %}" class="w-20 mx-auto mb-3">
        <h2 class="text-3xl font-bold text-green-700">Completa tu perfil de Cliente</h2>
        <p class="text-gray-600 mt-2">Necesitamos estos datos para poder conectar contigo fácilmente.</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Dirección -->
        <div class="relative">
            <label class="text-sm text-gray-600">Dirección</label>
            <input type="text" name="direccion" required
                class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none transition"
                placeholder="Ej: Calle 10 # 5 - 25">
        </div>

        <!-- Teléfono -->
        <div class="relative">
            <label class="text-sm text-gray-600">Teléfono</label>
            <input type="text" name="telefono" required
                class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none transition"
                placeholder="Ej: 3201234567">
        </div>

        <!-- Botón -->
        <button type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold shadow-lg transition transform hover:scale-105">
            Guardar Información
        </button>
    </form>

    <!-- Mensaje inferior -->
    <p class="text-center text-xs text-gray-400 mt-6">
        CampoMarkt protege tu información y solo la usa para mejorar tu experiencia.
    </p>
</div>

</body>
</html>
